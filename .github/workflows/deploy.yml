name: CI/CD — Eden

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.INFRA_DEPLOY_KEY }}" ]; then
            echo "::error::Secret INFRA_DEPLOY_KEY is not configured."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha=sha-$(echo "$GITHUB_SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api.Dockerfile
          push: true
          tags: |
            ghcr.io/rbxrobotica/eden-api:${{ steps.tag.outputs.sha }}
            ghcr.io/rbxrobotica/eden-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in rbx-infra
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.sha }}
          INFRA_DEPLOY_KEY: ${{ secrets.INFRA_DEPLOY_KEY }}
          KUSTOMIZATION_FILE: apps/prod/eden/kustomization.yml
          KUSTOMIZE_IMAGE_NAME: ghcr.io/rbxrobotica/eden-api
        run: |
          mkdir -p ~/.ssh
          echo "$INFRA_DEPLOY_KEY" > ~/.ssh/infra_deploy_key
          chmod 600 ~/.ssh/infra_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/infra_deploy_key -o IdentitiesOnly=yes"

          git clone git@github.com:rbxrobotica/rbx-infra.git /tmp/rbx-infra
          cd /tmp/rbx-infra

          python - <<'PY'
          from pathlib import Path
          import os

          path = Path(os.environ["KUSTOMIZATION_FILE"])
          image_name = os.environ["KUSTOMIZE_IMAGE_NAME"]
          image_tag = os.environ["IMAGE_TAG"]

          lines = path.read_text().splitlines()
          for idx, line in enumerate(lines):
              if line.strip() == f"- name: {image_name}":
                  for next_idx in range(idx + 1, len(lines)):
                      if lines[next_idx].lstrip().startswith("newTag:"):
                          indent = lines[next_idx].split("newTag:")[0]
                          lines[next_idx] = f"{indent}newTag: {image_tag}"
                          path.write_text("\n".join(lines) + "\n")
                          raise SystemExit(0)

          raise SystemExit(f"Image block for {image_name} not found in {path}")
          PY

          git config user.email "ci@rbx.ia.br"
          git config user.name "RBX CI"
          git add "$KUSTOMIZATION_FILE"
          git diff --cached --quiet || git commit -m "chore(eden-api): deploy ${IMAGE_TAG} [skip ci]"
          git pull --rebase
          git push

  build-portal:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.INFRA_DEPLOY_KEY }}" ]; then
            echo "::error::Secret INFRA_DEPLOY_KEY is not configured."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha=sha-$(echo "$GITHUB_SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Portal image
        uses: docker/build-push-action@v6
        with:
          context: ./portal
          file: ./portal/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=https://api.eden.rbx.ia.br
          tags: |
            ghcr.io/rbxrobotica/eden-portal:${{ steps.tag.outputs.sha }}
            ghcr.io/rbxrobotica/eden-portal:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in rbx-infra
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.sha }}
          INFRA_DEPLOY_KEY: ${{ secrets.INFRA_DEPLOY_KEY }}
          KUSTOMIZATION_FILE: apps/prod/eden/kustomization.yml
          KUSTOMIZE_IMAGE_NAME: ghcr.io/rbxrobotica/eden-portal
        run: |
          mkdir -p ~/.ssh
          echo "$INFRA_DEPLOY_KEY" > ~/.ssh/infra_deploy_key
          chmod 600 ~/.ssh/infra_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/infra_deploy_key -o IdentitiesOnly=yes"

          git clone git@github.com:rbxrobotica/rbx-infra.git /tmp/rbx-infra
          cd /tmp/rbx-infra

          python - <<'PY'
          from pathlib import Path
          import os

          path = Path(os.environ["KUSTOMIZATION_FILE"])
          image_name = os.environ["KUSTOMIZE_IMAGE_NAME"]
          image_tag = os.environ["IMAGE_TAG"]

          lines = path.read_text().splitlines()
          for idx, line in enumerate(lines):
              if line.strip() == f"- name: {image_name}":
                  for next_idx in range(idx + 1, len(lines)):
                      if lines[next_idx].lstrip().startswith("newTag:"):
                          indent = lines[next_idx].split("newTag:")[0]
                          lines[next_idx] = f"{indent}newTag: {image_tag}"
                          path.write_text("\n".join(lines) + "\n")
                          raise SystemExit(0)

          raise SystemExit(f"Image block for {image_name} not found in {path}")
          PY

          git config user.email "ci@rbx.ia.br"
          git config user.name "RBX CI"
          git add "$KUSTOMIZATION_FILE"
          git diff --cached --quiet || git commit -m "chore(eden-portal): deploy ${IMAGE_TAG} [skip ci]"
          git pull --rebase
          git push
